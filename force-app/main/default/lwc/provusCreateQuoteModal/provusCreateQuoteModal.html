<template>
    <template if:true={isOpen}>

        <!-- Overlay -->
        <div class="modal-overlay"
             onclick={handleOverlayClick}>
        </div>

        <!-- Modal -->
        <div class="modal-box">

            <!-- Header -->
            <div class="modal-header">
                <h2 class="modal-title">Create New Quote</h2>
                <button class="close-btn"
                        onclick={handleClose}>✕
                </button>
            </div>

            <!-- Body -->
            <div class="modal-body">

                <!-- Opportunity OPTIONAL (Moved up) -->
                <div class="form-group">
                    <lightning-combobox
                        name="opportunity"
                        label="Opportunity"
                        value={opportunityId}
                        placeholder="Select an opportunity (optional)..."
                        options={opportunityOptions}
                        onchange={handleOpportunityChange}>
                    </lightning-combobox>
                </div>

                <!-- Account REQUIRED (Now below Opportunity) -->
                <div class="form-group">
                    <lightning-combobox
                        name="account"
                        label="Account"
                        value={accountId}
                        placeholder="Select an account..."
                        options={accountOptions}
                        onchange={handleAccountChange}
                        disabled={isAccountDisabled}
                        required>
                    </lightning-combobox>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea
                        class="form-textarea"
                        placeholder="Enter quote description (optional)..."
                        maxlength="255"
                        onchange={handleDescriptionChange}>
                    </textarea>
                    <span class="char-count">
                        {descriptionLength}/255 characters
                    </span>
                </div>

                <!-- Dates -->
                <div class="form-row">
                    <div class="form-group form-group-half">
                        <label class="form-label">
                            Start Date
                            <span class="required">*</span>
                        </label>
                        <input
                            type="date"
                            class="form-input"
                            value={startDate}
                            onchange={handleStartDateChange} />
                    </div>
                    <div class="form-group form-group-half">
                        <label class="form-label">
                            End Date
                        </label>
                        <input
                            type="date"
                            class="form-input"
                            value={endDate}
                            onchange={handleEndDateChange} />
                    </div>
                </div>

                <!-- Time Period -->
                <div class="form-group">
                    <label class="form-label">
                        Time Period
                        <span class="required">*</span>
                    </label>
                    <select
                        class="form-select"
                        onchange={handleTimePeriodChange}>
                        <option value="Days">Days</option>
                        <option value="Weeks">Weeks</option>
                        <option value="Months" selected>Months</option>
                        <option value="Quarters">Quarters</option>
                    </select>
                </div>

                <!-- Error -->
                <template if:true={errorMessage}>
                    <div class="error-msg">
                        {errorMessage}
                    </div>
                </template>

            </div>

            <!-- Footer -->
            <div class="modal-footer">
                <button class="btn-cancel"
                        onclick={handleClose}>
                    Cancel
                </button>
                <button
                    class="btn-create"
                    onclick={handleCreate}
                    disabled={isCreating}>
                    <template if:true={isCreating}>
                        Creating...
                    </template>
                    <template if:false={isCreating}>
                        Create
                    </template>
                </button>
            </div>

        </div>
    </template>
</template>
