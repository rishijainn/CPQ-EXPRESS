<template>
    <div class="page-container">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <div class="page-header-left">
                <h1 class="page-title">Quotes</h1>
                <p class="page-subtitle">
                    Manage sales quotes and proposals
                </p>
            </div>
            <div class="page-header-right">
                <button class="btn-new" onclick={handleNew}>
                    + New
                </button>
                <button class="btn-icon" onclick={handleRefresh}>
                    🔄 Refresh
                </button>
            </div>
        </div>

        <!-- FILTERS ROW -->
        <div class="filters-row">
            <!-- Search -->
            <input
                type="text"
                class="search-input"
                placeholder="Search quotes..."
                onchange={handleSearch} />

            <!-- Status Filter -->
            <select
                class="filter-select"
                onchange={handleStatusFilter}>
                <option value="All">All Status</option>
                <option value="Draft">Draft</option>
                <option value="Pending Approval">Pending Approval</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>

            <!-- Account Filter -->
            <select
                class="filter-select"
                onchange={handleAccountFilter}>
                <option value="All">All Accounts</option>
                <template for:each={accountOptions}
                          for:item="acc">
                    <option key={acc.Id} value={acc.Id}>
                        {acc.Name}
                    </option>
                </template>
            </select>

            <!-- View count -->
            <span class="view-count">
                View {filteredQuotes.length}
            </span>
        </div>

        <!-- SHOWING COUNT -->
        <div class="showing-count">
            Showing {startRecord}-{endRecord} of {totalRecords}
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th class="col-num">#</th>
                        <th class="col-id">ID</th>
                        <th class="col-opp">Opportunity</th>
                        <th class="col-acc">Account</th>
                        <th class="col-status">Status</th>
                        <th class="col-by">Created By</th>
                        <th class="col-date">Created Date</th>
                        <th class="col-amount">Total Amount</th>
                        <th class="col-disc">Discount %</th>
                        <th class="col-margin">Margin %</th>
                        <th class="col-actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Loading state -->
                    <template if:true={isLoading}>
                        <tr>
                            <td colspan="11" class="loading-cell">
                                Loading quotes...
                            </td>
                        </tr>
                    </template>

                    <!-- Empty state -->
                    <template if:true={isEmpty}>
                        <tr>
                            <td colspan="11" class="empty-cell">
                                No quotes found.
                            </td>
                        </tr>
                    </template>

                    <!-- Data rows -->
                    <template if:false={isLoading}>
                        <template for:each={paginatedQuotes}
                                  for:item="quote"
                                  for:index="index">
                            <tr
                                key={quote.Id}
                                class="table-row"
                                data-id={quote.Id}
                                onclick={handleRowClick}>
                                <td class="col-num">
                                    {quote.rowNumber}
                                </td>
                                <td class="col-id">
                                    <span
                                        class="quote-link"
                                        data-id={quote.Id}
                                        onclick={handleQuoteClick}>
                                        {quote.QuoteNumber}
                                    </span>
                                </td>
                                <td>{quote.opportunityName}</td>
                                <td>{quote.accountName}</td>
                                <td>
                                    <c-provus-status-badge
                                        status={quote.Status}>
                                    </c-provus-status-badge>
                                </td>
                                <td>{quote.createdByName}</td>
                                <td>{quote.formattedDate}</td>
                                <td class="amount-cell">
                                    {quote.formattedAmount}
                                </td>
                                <td class="center-cell">
                                    {quote.formattedDiscount}
                                </td>
                                <td class="center-cell">
                                    {quote.formattedMargin}
                                </td>
                                <td onclick={stopPropagation}>
                                    <div class="action-btns">
                                        <!-- Clone -->
                                        <button
                                            class="action-btn"
                                            title="Clone"
                                            data-id={quote.Id}
                                            onclick={handleClone}>
                                            📋
                                        </button>
                                        <!-- Delete -->
                                        <button
                                            class="action-btn action-btn-delete"
                                            title="Delete"
                                            data-id={quote.Id}
                                            onclick={handleDelete}>
                                            🗑️
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- PAGINATION -->
        <div class="pagination">
            <button
                class="page-btn"
                onclick={handlePrevPage}
                disabled={isFirstPage}>
                ‹ Previous
            </button>
            <span class="page-info">
                Page {currentPage} of {totalPages}
            </span>
            <button
                class="page-btn"
                onclick={handleNextPage}
                disabled={isLastPage}>
                Next ›
            </button>
        </div>

    </div>

    <!-- CREATE QUOTE MODAL -->
    <c-provus-create-quote-modal
        is-open={showCreateModal}
        onclose={handleModalClose}
        onquotecreated={handleQuoteCreated}>
    </c-provus-create-quote-modal>

    <!-- CLONE QUOTE MODAL -->
    <template if:true={isCloneModalOpen}>
        <div class="modal-overlay">
            <div class="modal-card clone-modal">
                <div class="modal-header">
                    <h2 class="modal-title">Clone Quote</h2>
                </div>
                <div class="modal-body">
                    <p class="modal-desc">
                        Clone quote "{cloningQuoteNumber}" to create a duplicate with all its related data. 
                        Optionally select a different account for the cloned quote.
                    </p>
                    
                    <div class="form-group">
                        <label class="form-label">Clone to Account (optional)</label>
                        <select class="form-select" onchange={handleCloneAccountChange}>
                            <option value="">Keep original account...</option>
                            <template for:each={accountOptions} for:item="acc">
                                <option key={acc.Id} value={acc.Id}>{acc.Name}</option>
                            </template>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" onclick={handleCloneCancel}>Cancel</button>
                    <button class="btn-clone-confirm" 
                            onclick={handleCloneConfirm} 
                            disabled={isCloning}>
                        {isCloning ? 'Cloning...' : 'Clone Quote'}
                    </button>
                </div>
            </div>
        </div>
    </template>

</template>
