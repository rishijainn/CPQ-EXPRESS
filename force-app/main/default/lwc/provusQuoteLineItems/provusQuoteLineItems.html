<template>
    <div class="line-items-wrapper">

        <!-- HEADER CONTROLS -->
        <div class="line-items-toolbar">
            <div class="toolbar-left">
                <span class="link-action" onclick={handleCollapseAll}>{collapseAllLabel}</span>
                <template if:true={hasSelection}>
                    <button class="btn-text-danger" onclick={handleDeleteSelected}>
                        Delete Selected ({selectedCount})
                    </button>
                </template>
            </div>
            <template if:true={isDraft}>
                <div class="toolbar-right">
                    <button class="btn-action-light" onclick={handleAddPhase}>+ Add Phase</button>
                    <button class="btn-action-light" onclick={handleAddItem}>+ Add Item</button>
                </div>
            </template>
        </div>

        <!-- TABLE SECTION -->
        <div class="table-container">
            <div class="table-scroll-inner">
            <table class="slds-table-style">
                <thead>
                    <tr>
                        <th class="w-check">
                            <input type="checkbox" onchange={handleSelectAll} checked={isAllSelected} disabled={isLocked}/>
                        </th>
                        <th class="w-drag"></th>
                        <th class="w-name">Name</th>
                        <th class="w-task">Task</th>
                        <th class="w-date">Start Date</th>
                        <th class="w-date w-end-date">End Date</th>
                        <th class="w-qty">Quantity</th>
                        <th class="w-rate">Base Rate</th>
                        <th class="w-price w-link-col">Unit Price</th>
                        <th class="w-disc">Discount %</th>
                        <th class="w-total">Total Price</th>
                    </tr>
                </thead>

                <!-- ROOT DROP ZONE -->
                <tbody class="tbody-drop-zone" data-phase="" 
                       ondragover={handleDragOver} ondragleave={handleDragLeave} ondrop={handleDrop}>
                    <template if:true={isEmpty}>
                        <tr>
                            <td colspan="11" class="empty-msg">No line items. Start by adding an item or phase.</td>
                        </tr>
                    </template>
                </tbody>

                <!-- ROWS (PHASES & ITEMS) -->
                <tbody>
                    <template for:each={displayRows} for:item="row">
                        
                        <!-- PHASE ROW -->
                        <template if:true={row.isPhase}>
                            <tr key={row.phaseName} class={row.dragOverClass} data-phase={row.phaseName}
                                ondragover={handleDragOver} ondragleave={handleDragLeave} ondrop={handleDrop}>
                                <td>
                                    <input type="checkbox" onchange={handleSelectPhase} data-phase={row.phaseName}
                                           checked={row.isPhaseSelected} disabled={isLocked}/>
                                </td>
                                <td class="drag-icon">⠿</td>
                                <td colspan="9" class="phase-header-cell">
                                    <span class="phase-toggle" onclick={handleTogglePhase} data-phase={row.phaseName}>
                                        {row.chevron}
                                    </span>
                                    <span class="phase-name-text">{row.phaseName}</span>
                                    <template if:true={isDraft}>
                                        <button class="btn-mini-add" onclick={handleAddItem} data-phase={row.phaseName}>+ ADD ITEM</button>
                                    </template>
                                </td>
                            </tr>
                        </template>

                        <!-- ITEM ROW -->
                        <template if:true={row.isItem}>
                            <tr key={row.record.Id} class={row.rowClass} draggable={isDraft}
                                data-id={row.record.Id} ondragstart={handleDragStart}>
                                <td>
                                    <input type="checkbox" onchange={handleSelectItem} data-id={row.record.Id}
                                           checked={row.isSelected} disabled={isLocked}/>
                                </td>
                                <td class="drag-icon">⠿</td>
                                <td class="name-col">
                                    <div class="name-flex">
                                        <span class={row.record.typeIconClass}>{row.record.typeIcon}</span>
                                        <span class="item-name">{row.record.Name}</span>
                                        <span class="icon-info-small">ℹ️</span>
                                    </div>
                                </td>
                                <td>
                                    <input type="text" class="cell-input" placeholder="Add task..." 
                                           value={row.record.Task__c} data-id={row.record.Id} 
                                           data-field="Task__c" onchange={handleFieldChange} disabled={isLocked}/>
                                </td>
                                <td>
                                    <input type="date" class="cell-input date-input" 
                                           value={row.record.Start_Date__c} data-id={row.record.Id} 
                                           data-field="Start_Date__c" onchange={handleFieldChange} disabled={isLocked}/>
                                </td>
                                <td>
                                    <input type="date" class="cell-input date-input" 
                                           value={row.record.End_Date__c} data-id={row.record.Id} 
                                           data-field="End_Date__c" onchange={handleFieldChange} disabled />
                                </td>
                                <td>
                                    <input type="number" class="cell-input num-input" 
                                           value={row.record.Quantity__c} data-id={row.record.Id} 
                                           data-field="Quantity__c" onchange={handleFieldChange} disabled={isLocked}/>
                                </td>
                                <td class="currency-cell">{row.record.formattedBaseRate}</td>
                                <td class="currency-cell price-col">
                                    <span class="price-link" onclick={handleUnitPriceClick} data-id={row.record.Id}>
                                        {row.record.formattedUnitPrice}
                                    </span>
                                </td>
                                <td class="discount-col">
                                    <div class="disc-flex">
                                        <input type="number" class="cell-input num-input" 
                                               value={row.record.Discount_Percent__c} data-id={row.record.Id} 
                                               data-field="Discount_Percent__c" onchange={handleFieldChange} disabled={isLocked}/>
                                        <span class="sym">%</span>
                                    </div>
                                </td>
                                <td class="currency-cell total-col balance-col">{row.record.formattedTotal}</td>
                            </tr>
                        </template>

                    </template>
                </tbody>

                <!-- FOOTER -->
                <tfoot>
                    <tr class="summary-total-row">
                        <td colspan="10" class="txt-right">
                           <strong>Total</strong>
                        </td>
                        <td class="total-final-val">
                            <strong>{grandTotal}</strong>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div><!-- /table-scroll-inner -->

        <!-- Unit Price Calculation Popover (absolute, inside wrapper, outside scroll) -->
        <template if:true={popoverItem}>
            <div class="popover-backdrop" onclick={handleClosePopover}></div>
            <div class="unit-price-popover-fixed" style={popoverStyle}>
                <div class="popover-header">
                    <span>Unit Price Calculation</span>
                    <button class="popover-close" onclick={handleClosePopover}>✕</button>
                </div>
                <div class="popover-body">
                    <template if:true={popoverItem.isResourceRole}>
                        <div class="popover-row">
                            <span class="pop-label">Base Rate:</span>
                            <span class="pop-val">{popoverItem.baseRateLabel}</span>
                        </div>
                        <div class="popover-row">
                            <span class="pop-label">Time Period ({popoverItem.periodLabel}):</span>
                            <span class="pop-val">{popoverItem.periodHours}</span>
                        </div>
                        <div class="popover-row">
                            <span class="pop-label">Calculation:</span>
                            <span class="pop-val">{popoverItem.calcLabel}</span>
                        </div>
                    </template>
                    <template if:false={popoverItem.isResourceRole}>
                        <div class="popover-row">
                            <span class="pop-label">Base Price (Per Item):</span>
                            <span class="pop-val">{popoverItem.basePriceLabel}</span>
                        </div>
                        <p class="pop-sublabel">Billing Unit: Each (no time multiplier)</p>
                    </template>
                    <div class="popover-divider"></div>
                    <div class="popover-row popover-total">
                        <span class="pop-label-total">Unit Price:</span>
                        <span class="pop-val-total">{popoverItem.unitPrice}</span>
                    </div>
                </div>
            </div>
        </template>

        </div><!-- /table-container -->

        <!-- ADD PHASE MODAL -->
        <template if:true={isPhaseModalOpen}>
            <div class="modal-backdrop">
                <div class="premium-modal modal-small animate-pop">
                    <div class="modal-header">
                        <h2 class="modal-title">Create New Phase</h2>
                        <button class="modal-close" onclick={handleClosePhaseModal}>✕</button>
                    </div>
                    <div class="modal-body">
                        <p class="modal-subtitle">Organize your quote by adding a structured group for your items.</p>
                        <div class="input-group">
                            <label class="input-label">Phase Name</label>
                            <input type="text" class="premium-input" placeholder="e.g., Implementation, Discovery..." 
                                   value={newPhaseName} onchange={handlePhaseNameChange} autofocus/>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn-secondary" onclick={handleClosePhaseModal}>Cancel</button>
                        <button class="btn-primary" onclick={handleConfirmAddPhase}>Create Phase</button>
                    </div>
                </div>
            </div>
        </template>

    </div><!-- /line-items-wrapper -->

    <!-- MODAL -->
    <c-provus-add-items-modal
        is-open={showAddModal}
        quote-id={quoteId}
        target-phase={targetPhase}
        onclose={handleModalClose}
        onitemsadded={handleItemsAdded}>
    </c-provus-add-items-modal>
</template>
