<template>
    <div class="page-container">
        <div class="page-header">
            <div>
                <h1 class="page-title">Products</h1>
                <p class="page-subtitle">
                    Manage your Products
                </p>
            </div>
            <div class="header-right">
                <template if:true={isManager}>
                    <button class="btn-new"
                            onclick={handleNew}>+ New</button>
                </template>
                <!-- <button class="btn-icon" onclick={handleRefresh} disabled={isLoading}>
                    <template if:false={isLoading}>
                        🔄 Refresh
                    </template></button>
                    <template if:true={isLoading}>
                        ⌛ Refreshing...
                    </template>
                </button> -->
            </div>
        </div>

        <div class="filters-row">
            <input type="text"
                   class="search-input"
                   placeholder="Search Product..."
                   onchange={handleSearch} />
        </div>

        <div class="showing-count">
            Showing {startRecord}-{endRecord}
            of {totalRecords}
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Billing Unit</th>
                        <th>Price</th>
                        <th>Cost</th>
                        <th>Tags</th>
                        <th>Active</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template if:true={isEmpty}>
                        <tr>
                            <td colspan="9" class="empty-cell">
                                No products found.
                            </td>
                        </tr>
                    </template>
                    <template for:each={paginatedProducts}
                              for:item="prod">
                        <tr key={prod.Id} class="table-row">
                            <td>{prod.rowNumber}</td>
                            <td>
                                <template if:true={isManager}>
                                    <span class="id-link" data-id={prod.Id} onclick={handleEdit}>
                                        {prod.Name}
                                    </span>
                                </template>
                                <template if:false={isManager}>
                                    <span>{prod.Name}</span>
                                </template>
                            </td>
                            <td>
                                <template if:true={isManager}>
                                    <span class="clickable-name" data-id={prod.Id} onclick={handleEdit}>
                                        {prod.Name__c}
                                    </span>
                                </template>
                                <template if:false={isManager}>
                                    <span>{prod.Name__c}</span>
                                </template>
                            </td>
                            <td>
                                <span class="billing-badge">
                                    {prod.Billing_Unit__c}
                                </span>
                            </td>
                            <td class="price-cell">
                                {prod.formattedPrice}
                            </td>
                            <td class="price-cell">
                                {prod.formattedCost}
                            </td>
                            <td>{prod.tagsDisplay}</td>
                            <td>
                                <template if:true={isManager}>
                                    <label class="toggle-wrap">
                                        <input
                                            type="checkbox"
                                            class="toggle-input"
                                            checked={prod.Is_Active__c}
                                            data-id={prod.Id}
                                            onchange={handleToggle} />
                                        <span class="toggle-slider">
                                        </span>
                                    </label>
                                </template>
                            </td>
                            <td>
                                <template if:true={isManager}>
                                    <button
                                        class="action-btn"
                                        data-id={prod.Id}
                                        onclick={handleDelete}>
                                        🗑️
                                    </button>
                                </template>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="page-btn"
                    onclick={handlePrevPage}
                    disabled={isFirstPage}>
                ‹ Previous
            </button>
            <span class="page-info">
                Page {currentPage} of {totalPages}
            </span>
            <button class="page-btn"
                    onclick={handleNextPage}
                    disabled={isLastPage}>
                Next ›
            </button>
        </div>
    </div>

    <!-- NEW PRODUCT MODAL -->
    <template if:true={showModal}>
        <div class="modal-overlay"
             onclick={handleModalClose}></div>
        <div class="modal-box">
            <div class="modal-header">
                <h2 class="modal-title">
                    <template if:true={formData.id}>Edit Product</template>
                    <template if:false={formData.id}>New Product</template>
                </h2>
                <button class="close-btn"
                        onclick={handleModalClose}>✕
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">
                        Name <span class="req">*</span>
                    </label>
                    <input type="text"
                           class="form-input"
                           placeholder="e.g. Acme Widget"
                           value={formData.name}
                           onchange={handleFieldChange}
                           data-field="name" />
                </div>
                <div class="form-group">
                    <label class="form-label">
                        Billing Unit
                    </label>
                    <select class="form-select"
                            onchange={handleFieldChange}
                            data-field="billingUnit">
                        <option value="Each" selected>Each</option>
                        
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group form-half">
                        <label class="form-label">
                            Price <span class="req">*</span>
                        </label>
                        <input type="number"
                               class="form-input"
                               placeholder="0.00"
                               value={formData.price}
                               onchange={handleFieldChange}
                               data-field="price" />
                    </div>
                    <div class="form-group form-half">
                        <label class="form-label">Cost</label>
                        <input type="number"
                               class="form-input"
                               placeholder="0.00"
                               value={formData.cost}
                               onchange={handleFieldChange}
                               data-field="cost" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Tags</label>
                    <input type="text"
                           class="form-input"
                           placeholder="e.g. Hardware, SaaS"
                           value={formData.tags}
                           onchange={handleFieldChange}
                           data-field="tags" />
                </div>
                <template if:true={errorMessage}>
                    <div class="error-msg">{errorMessage}</div>
                </template>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel"
                        onclick={handleModalClose}>
                    Cancel
                </button>
                <button class="btn-save"
                        onclick={handleSave}
                        disabled={isSaving}>
                    <template if:true={isSaving}>
                        Saving...
                    </template>
                    <template if:false={isSaving}>
                        Save
                    </template>
                </button>
            </div>
        </div>
    </template>
</template>
